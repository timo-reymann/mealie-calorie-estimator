version: '2.1'

only_tags: &only_tags
  filters:
    branches:
      ignore: /.*/
    tags:
      only: /.*/

orbs:
  node: circleci/node@5.3.0
  docker: circleci/docker@3.0.1
  semantic-release: trustedshops-public/semantic-release@6.1.0

executors:
  node:
    docker:
      - image: cimg/node:22.14

jobs:
  unit-test:
    executor: node
    steps:
      - checkout
      - restore_cache:
          key: npm-v3-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: |
            npm install
            npm install @rolldown/binding-linux-x64-gnu --no-save
      - save_cache:
          key: npm-v3-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Type check
          command: npm run typecheck
      - run:
          name: Run tests
          command: npm test
      - run:
          name: Collect test results
          command: mkdir -p test-results && mv test-results.xml test-results/
          when: always
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  publish-docker-image:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - run:
          name: Docker login
          command: echo "${DOCKER_TOKEN}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
      - docker/build:
          image: timoreymann/mealie-calorie-estimator
          tag: latest,${CIRCLE_TAG}
      - docker/push:
          image: timoreymann/mealie-calorie-estimator
          tag: latest,${CIRCLE_TAG}
      - run:
          name: Update Docker Hub description
          command: |
            JWT=$(curl -s -X POST \
              -d "username=${DOCKER_USERNAME}&password=${DOCKER_TOKEN}" \
              https://hub.docker.com/v2/users/login/ | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
            DESCRIPTION=$(python3 -c "import json; print(json.dumps(open('README.md').read()))")
            curl -s -o /dev/null -X PATCH \
              -H "Authorization: JWT ${JWT}" \
              -H "Content-Type: application/json" \
              -d "{\"full_description\": ${DESCRIPTION}}" \
              "https://hub.docker.com/v2/repositories/timoreymann/mealie-calorie-estimator/"
            echo "Docker Hub description updated"

workflows:
  version: 2
  main:
    jobs:
      - unit-test
      - semantic-release/with_existing_config:
          name: semantic-release
          requires:
            - unit-test
          context:
            - semantic-release
          filters:
            branches:
              only:
                - main

  release:
    jobs:
      - unit-test:
          <<: *only_tags
      - publish-docker-image:
          <<: *only_tags
          requires:
            - unit-test

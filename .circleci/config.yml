version: '2.1'

only_tags: &only_tags
  filters:
    branches:
      ignore: /.*/
    tags:
      only: /.*/

orbs:
  node: circleci/node@5.3.0
  docker: circleci/docker@3.0.1
  semantic-release: trustedshops-public/semantic-release@6.1.0

executors:
  node:
    docker:
      - image: cimg/node:22.11

jobs:
  unit-test:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-version: 2
          npm-install-command: npm install
      - run:
          name: Install platform-specific native binding
          command: npm install @rolldown/binding-linux-x64-gnu --no-save
      - run:
          name: Type check
          command: npm run typecheck
      - run:
          name: Run tests
          command: npm test
      - run:
          name: Collect test results
          command: mkdir -p test-results && mv test-results.xml test-results/
          when: always
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  publish-docker-image:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - docker/check:
          docker_username: DOCKER_USERNAME
          docker_password: DOCKER_TOKEN
      - docker/build:
          image: timoreymann/mealie-calorie-estimator
          tag: latest,${CIRCLE_TAG}
      - docker/push:
          image: timoreymann/mealie-calorie-estimator
          tag: latest,${CIRCLE_TAG}

workflows:
  version: 2
  main:
    jobs:
      - unit-test
      - semantic-release/with_existing_config:
          name: semantic-release
          requires:
            - unit-test
          context:
            - semantic-release
          filters:
            branches:
              only:
                - main

  release:
    jobs:
      - unit-test:
          <<: *only_tags
      - publish-docker-image:
          <<: *only_tags
          requires:
            - unit-test
